name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Handy.exe
          - os: ubuntu-latest
            artifact_name: Handy
          - os: macos-latest
            artifact_name: Handy

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-tk \
            libxcb-cursor0 \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxrender1 \
            libxext6

      - name: Install Python dependencies
        run: pip install -r requirements.txt nuitka zstandard

      - name: Build with Nuitka
        run: python build_nuitka.py

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install innosetup --no-progress -y
          iscc /DMyAppVersion=${{ github.ref_name }} installer/HandySetup.iss

      - name: Build installer (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist_pkg
          cp release/Handy dist_pkg/
          pkgbuild \
            --root dist_pkg \
            --identifier com.handy.app \
            --version ${{ github.ref_name }} \
            --install-location /Applications \
            release/Handy-Installer.pkg

      - name: Build installer (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          mkdir -p deb_pkg/usr/local/bin
          mkdir -p deb_pkg/DEBIAN
          cp release/Handy deb_pkg/usr/local/bin/Handy
          cat > deb_pkg/DEBIAN/control << EOF
          Package: handy
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Handy
          Description: Handy - Hand gesture control
          EOF
          dpkg-deb --build deb_pkg release/Handy-Installer.deb

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Handy-${{ runner.os }}-portable
          path: release/${{ matrix.artifact_name }}

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Handy-Windows-installer
          path: release/Handy-Setup.exe

      - name: Upload installer artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Handy-macOS-installer
          path: release/Handy-Installer.pkg

      - name: Upload installer artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Handy-Linux-installer
          path: release/Handy-Installer.deb

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          # Portable
          mv artifacts/Handy-Windows-portable/Handy.exe  artifacts/Handy-Windows.exe
          mv artifacts/Handy-Linux-portable/Handy         artifacts/Handy-Linux
          mv artifacts/Handy-macOS-portable/Handy         artifacts/Handy-macOS

          # Installers
          mv artifacts/Handy-Windows-installer/Handy-Setup.exe  artifacts/Handy-Windows-Setup.exe
          mv artifacts/Handy-macOS-installer/Handy-Installer.pkg artifacts/Handy-macOS-Installer.pkg
          mv artifacts/Handy-Linux-installer/Handy-Installer.deb  artifacts/Handy-Linux-Installer.deb

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Handy-Windows.exe
            artifacts/Handy-Windows-Setup.exe
            artifacts/Handy-Linux
            artifacts/Handy-Linux-Installer.deb
            artifacts/Handy-macOS
            artifacts/Handy-macOS-Installer.pkg
